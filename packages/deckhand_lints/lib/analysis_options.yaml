include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    # strict-raw-types intentionally left off: flips a large number of
    # pre-existing inference warnings on Map/List literals that live
    # in unrelated code. Tighten as a dedicated cleanup pass, not now.
  errors:
    invalid_assignment: error
    missing_required_param: error
    missing_return: error
    dead_code: warning
    todo: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    - avoid_empty_else
    - avoid_print
    - avoid_relative_lib_imports
    - avoid_returning_null_for_void
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - control_flow_in_finally
    - empty_statements
    - hash_and_equals
    - no_duplicate_case_values
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_is_empty
    - prefer_is_not_empty
    - throw_in_finally
    - unnecessary_await_in_return
    - use_build_context_synchronously
