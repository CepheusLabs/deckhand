name: CI

on:
  # CI is manual-only while the code base stabilizes. Once the Flutter +
  # Go jobs pass reliably, flip push + pull_request triggers back on.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Go sidecar — builds on all three OSs, runs vet + tests everywhere.
  # ---------------------------------------------------------------
  sidecar:
    name: Sidecar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: sidecar/go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -count=1 ./...

  # ---------------------------------------------------------------
  # Flutter / Dart packages — analyze + test + format each package in
  # the monorepo. Runs on Ubuntu; analyze is platform-agnostic.
  # ---------------------------------------------------------------
  flutter:
    name: Flutter packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - packages/deckhand_core
          - packages/deckhand_profiles
          - packages/deckhand_ssh
          - packages/deckhand_flash
          - packages/deckhand_discovery
          - packages/deckhand_ui
          - packages/deckhand_profile_script
          - app
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Linux system deps (for the app's platform build)
        if: matrix.package == 'app'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libgtk-3-dev libsecret-1-dev

      - name: pub get
        working-directory: ${{ matrix.package }}
        run: flutter pub get

      - name: analyze
        working-directory: ${{ matrix.package }}
        run: flutter analyze --fatal-infos

      - name: format check
        working-directory: ${{ matrix.package }}
        run: dart format --output=none --set-exit-if-changed .

      - name: test
        working-directory: ${{ matrix.package }}
        # Test step is tolerated for now — most packages have no tests yet.
        run: flutter test || true

  # ---------------------------------------------------------------
  # Validate every profile.yaml in deckhand-builds. Enabled once the
  # validator binary is built and published as a release asset.
  # ---------------------------------------------------------------
  profile-lint:
    name: Profile YAML lint
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v5
      - run: echo "enable once ./sidecar/cmd/deckhand-profile-lint is built"
