name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Go sidecar — builds on all three OSs, runs vet + tests everywhere.
  # ---------------------------------------------------------------
  sidecar:
    name: Sidecar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: sidecar/go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -count=1 ./...

  # ---------------------------------------------------------------
  # Flutter / Dart packages — analyze + test each package in the
  # monorepo. Runs on Ubuntu; analyze is platform-agnostic.
  # ---------------------------------------------------------------
  flutter:
    name: Flutter packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - packages/deckhand_core
          - packages/deckhand_profiles
          - packages/deckhand_ssh
          - packages/deckhand_flash
          - packages/deckhand_discovery
          - packages/deckhand_ui
          - packages/deckhand_profile_script
          - app
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true

      - name: Linux system deps (for the app's platform build)
        if: matrix.package == 'app'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libgtk-3-dev libsecret-1-dev

      - name: pub get
        working-directory: ${{ matrix.package }}
        run: flutter pub get

      - name: analyze
        working-directory: ${{ matrix.package }}
        # --fatal-warnings (not --fatal-infos) — deprecation warnings from
        # RadioListTile / RadioGroup in newer Flutter versions are info-
        # level and still compile + run. We'll promote to --fatal-infos
        # once the RadioGroup migration lands across all screens.
        run: flutter analyze --fatal-warnings

      - name: test
        working-directory: ${{ matrix.package }}
        # Test step is tolerated for now — most packages have no tests yet.
        run: flutter test || true

  # ---------------------------------------------------------------
  # Canonical Dart formatting. Soft-fail during early development so
  # contributors can land work without worrying about trailing commas.
  # Flip to hard-fail before v1.0 ships.
  # ---------------------------------------------------------------
  format:
    name: Dart format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: stable
          cache: true
      - name: dart format (report only)
        run: |
          dart format --output=none --set-exit-if-changed . || \
            echo "::warning::dart format would rewrite files. Run 'dart format .' locally to normalize."

  # ---------------------------------------------------------------
  # Validate every profile.yaml in deckhand-builds. Enabled once the
  # validator binary is built and published as a release asset.
  # ---------------------------------------------------------------
  profile-lint:
    name: Profile YAML lint
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v5
      - run: echo "enable once ./sidecar/cmd/deckhand-profile-lint is built"
