name: deckhand
description: Deckhand desktop app — installs Klipper/Kalico on 3D printers.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.0.0
  flutter_secure_storage: ^10.0.0
  slang: ^4.0.0
  slang_flutter: ^4.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
  cupertino_icons: ^1.0.8

  deckhand_core:
    path: ../packages/deckhand_core
  deckhand_profiles:
    path: ../packages/deckhand_profiles
  deckhand_ssh:
    path: ../packages/deckhand_ssh
  deckhand_flash:
    path: ../packages/deckhand_flash
  deckhand_discovery:
    path: ../packages/deckhand_discovery
  deckhand_ui:
    path: ../packages/deckhand_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
